services:
  db:
    image: postgres:16
    container_name: project-management-db
    environment:
      POSTGRES_DB: project_management
      POSTGRES_USER: pm_app
      POSTGRES_PASSWORD: pm_app_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm_app -d project_management"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: src/Host/ProjectManagement.Host/Dockerfile
    container_name: project-management-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Development
      Host__AutoMigrate: true
      ConnectionStrings__Default: Host=db;Port=5432;Database=project_management;Username=pm_app;Password=pm_app_password
      Jwt__Issuer: project-management
      Jwt__Audience: project-management-web
      Jwt__SigningKey: dev-only-signing-key-change-me-32-bytes-minimum!!
      Jwt__AccessTokenLifetimeMinutes: 60
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/project-management-web/Dockerfile
    container_name: project-management-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  db_data:

