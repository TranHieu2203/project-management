# Epic dependency chain — CRITICAL for dev sequencing
dependency_chain:
  # Epic 8 is the foundation — nothing in Phase 2-4 can start until 8.0 is done
  epic_8_story_0_is_absolute_blocker: true

  sequence:
    - step: 1
      action: "Complete Epic 1-7 (Phase 1) — can run in parallel tracks"
      parallel:
        - "Track A: Epics 1, 3, 4 (Core PM: Auth + Tasks + TimeEntry + Overload)"
        - "Track B: Epics 2, 5, 6 (Workforce: Vendors + Capacity + Cost)"
        - "Track C: Epics 7 (Notifications — last, depends on Track A+B events)"

    - step: 2
      action: "Story 8.0 — Issue table migration (ABSOLUTE BLOCKER)"
      note: "Run expand-contract: V008_001 → populate → V008_002 → V008_003 (rename+view) → V008_004 (contract) → V008_005 (cleanup)"
      gate: "Do NOT proceed until backward-compat view is smoke-tested"

    - step: 3
      action: "Epic 8 remaining stories (8.1-8.9) — can run in parallel after 8.0"
      parallel:
        - "8.1-8.2 (Issue Types) → enables 8.3 (parent-child)"
        - "8.4-8.5 (Project Settings Hub + General)"
        - "8.6 (Workflow Scheme) → prerequisite for Epic 11"
        - "8.7-8.9 (Reporter, Templates, Epic Colors)"

    - step: 4
      action: "Epics 9, 10, 11 — start after Epic 8 complete"
      parallel:
        - "Epic 9 (Agile Board) — independent after Epic 8"
        - "Epic 10 (Collaboration) — V010_001 Resource-User bridge BEFORE Story 10.2 (@mentions)"
        - "Epic 11 (Workflow Engine) — needs 8.6 (Workflow Scheme) first"

    - step: 5
      action: "Epics 12, 13, 14 — Phase 3, start after Epic 8 + relevant Phase 2 epics"
      parallel:
        - "Epic 12 (Search) — after Epic 8 (FTS index exists)"
        - "Epic 13 (Reports) — after Epic 9 (sprint data exists)"
        - "Epic 14 (Custom Fields) — after Epic 8 (JSONB column exists)"

    - step: 6
      action: "Epic 15 — Phase 4, start after Epics 8, 11, 14 complete"

