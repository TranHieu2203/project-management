<div class="gantt-timeline-wrapper" (scroll)="onScroll($event)">
  <svg #svgEl [attr.width]="totalWidth" [attr.height]="totalHeight" class="gantt-svg"
       [class.connect-mode]="connectMode">
    <!-- Arrowhead marker -->
    <defs>
      <marker id="gantt-arrowhead" markerWidth="8" markerHeight="6"
              refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#9E9E9E" />
      </marker>
      <marker id="gantt-arrowhead-connect" markerWidth="8" markerHeight="6"
              refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#2196F3" />
      </marker>
    </defs>

    <!-- ─── Timeline Header ─── -->
    <g class="gantt-header">
      @for (month of monthHeaders; track month.x) {
        <rect [attr.x]="month.x" y="0" [attr.width]="month.width" height="28"
              fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1" />
        <text [attr.x]="month.x + 6" y="18" class="header-text month-label">
          {{ month.label }}
        </text>
      }
      @for (cell of weekOrDayHeaders; track cell.x) {
        <rect [attr.x]="cell.x" y="28" [attr.width]="cell.width" height="28"
              fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" />
        <text [attr.x]="cell.x + 4" y="46" class="header-text">
          {{ cell.label }}
        </text>
      }
    </g>

    <!-- ─── Task Rows ─── -->
    <g class="gantt-rows" [attr.transform]="'translate(0,' + 56 + ')'">
      @for (task of visibleTasks; track task.id; let i = $index) {
        <g [attr.transform]="'translate(0,' + (i * 36) + ')'">
          <!-- Row background stripe -->
          <rect x="0" y="0" [attr.width]="totalWidth" height="36"
                [attr.fill]="i % 2 === 0 ? '#FAFAFA' : '#FFFFFF'"
                [attr.fill-opacity]="task.dirty ? 0.6 : 1" />

          <!-- Dirty row indicator -->
          @if (task.dirty) {
            <rect x="0" y="0" width="3" height="36" fill="#FF9800" />
          }

          <!-- Column gridlines -->
          @for (cell of weekOrDayHeaders; track cell.x) {
            <line [attr.x1]="cell.x" y1="0" [attr.x2]="cell.x" y2="36"
                  stroke="#F0F0F0" stroke-width="1" />
          }

          <!-- Phase bar -->
          @if (task.type === 'Phase' && task.plannedStart && task.plannedEnd) {
            <rect
              [attr.x]="dateToX(task.plannedStart)"
              y="4"
              [attr.width]="getBarWidth(task)"
              height="28"
              fill="#2196F3"
              fill-opacity="0.25"
              rx="4"
              stroke="#2196F3"
              stroke-width="2"
              style="cursor: move"
              (mousedown)="onBarMouseDown($event, task, 'move')" />
            <!-- Resize handle -->
            <rect
              [attr.x]="dateToX(task.plannedEnd) - 6"
              y="4"
              width="6"
              height="28"
              fill="#2196F3"
              fill-opacity="0.6"
              rx="2"
              style="cursor: ew-resize"
              (mousedown)="onBarMouseDown($event, task, 'resize')" />
          }

          <!-- Task bar -->
          @if (task.type === 'Task' && task.plannedStart && task.plannedEnd) {
            <rect
              [attr.x]="dateToX(task.plannedStart)"
              [attr.y]="(36 - barHeight) / 2"
              [attr.width]="getBarWidth(task)"
              [attr.height]="barHeight"
              [attr.fill]="getBarColor(task)"
              rx="3"
              style="cursor: move"
              (mousedown)="onBarMouseDown($event, task, 'move')">
              <title>{{ task.name }}: {{ task.plannedStart | date:'dd/MM/yyyy' }} – {{ task.plannedEnd | date:'dd/MM/yyyy' }}</title>
            </rect>
            <!-- Progress fill -->
            @if (task.percentComplete > 0) {
              <rect
                [attr.x]="dateToX(task.plannedStart)"
                [attr.y]="(36 - barHeight) / 2"
                [attr.width]="getBarWidth(task) * task.percentComplete / 100"
                [attr.height]="barHeight"
                fill="rgba(0,0,0,0.2)"
                rx="3"
                style="pointer-events: none" />
            }
            <!-- Resize handle -->
            <rect
              [attr.x]="dateToX(task.plannedEnd) - 6"
              [attr.y]="(36 - barHeight) / 2"
              width="6"
              [attr.height]="barHeight"
              [attr.fill]="getBarColor(task)"
              fill-opacity="0.8"
              rx="2"
              style="cursor: ew-resize"
              (mousedown)="onBarMouseDown($event, task, 'resize')" />
          }

          <!-- Milestone diamond -->
          @if (task.type === 'Milestone' && (task.plannedStart || task.plannedEnd)) {
            <polygon
              [attr.points]="getMilestoneDiamond(task)"
              fill="#FF9800"
              stroke="#E65100"
              stroke-width="1.5"
              style="cursor: move"
              (mousedown)="onBarMouseDown($event, task, 'move')">
              <title>{{ task.name }}</title>
            </polygon>
          }
        </g>
      }

      <!-- Today vertical line -->
      @if (todayX > 0 && todayX < totalWidth) {
        <line
          [attr.x1]="todayX" y1="0"
          [attr.x2]="todayX" [attr.y2]="visibleTasks.length * 36"
          stroke="#F44336" stroke-width="2" stroke-dasharray="4,4" />
      }
    </g>

    <!-- ─── Ghost Bar (while dragging) ─── -->
    @if (ghostTask && ghostTask.type === 'Task' && ghostTask.plannedStart && ghostTask.plannedEnd) {
      <g [attr.transform]="'translate(0,' + 56 + ')'">
        @for (t of visibleTasks; track t.id; let gi = $index) {
          @if (t.id === ghostTask!.id) {
            <rect
              [attr.x]="dateToX(ghostTask!.plannedStart)"
              [attr.y]="gi * 36 + (36 - barHeight) / 2"
              [attr.width]="getBarWidth(ghostTask!)"
              [attr.height]="barHeight"
              [attr.fill]="getBarColor(ghostTask!)"
              rx="3"
              opacity="0.5"
              style="pointer-events: none" />
          }
        }
      </g>
    }

    <!-- ─── Dependency Arrows ─── -->
    <g class="gantt-dependencies" [attr.transform]="'translate(0,' + 56 + ')'">
      @for (dep of dependencyPaths; track dep.id) {
        <path [attr.d]="dep.path"
              fill="none"
              stroke="#9E9E9E"
              stroke-width="1.5"
              marker-end="url(#gantt-arrowhead)"
              style="cursor: pointer"
              (click)="onDependencyClick(dep)" />
      }
    </g>

    <!-- ─── Connect Mode Line (live drag — updated via direct DOM, no CD) ─── -->
    <line #connectSvgLine
      x1="0" y1="0" x2="0" y2="0"
      stroke="#2196F3"
      stroke-width="2"
      stroke-dasharray="6,3"
      marker-end="url(#gantt-arrowhead-connect)"
      style="pointer-events: none; display: none" />
  </svg>
</div>
