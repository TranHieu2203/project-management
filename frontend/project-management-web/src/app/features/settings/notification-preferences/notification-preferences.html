<mat-card>
  <mat-card-header>
    <mat-card-title>Cài đặt thông báo</mat-card-title>
    <mat-card-subtitle>Quản lý thông báo email và trong ứng dụng</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div *ngIf="loading" style="display:flex;justify-content:center;padding:24px">
      <mat-spinner diameter="32"></mat-spinner>
    </div>
    <div *ngIf="!loading">
      <p style="font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.05em;margin:16px 0 8px">
        Digest hàng tuần
      </p>
      <ng-container *ngFor="let pref of preferences">
        <div *ngIf="pref.type === 'overload' || pref.type === 'overdue'"
             style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee">
          <span>{{ pref.label }}</span>
          <mat-slide-toggle [checked]="pref.isEnabled" (change)="toggle(pref.type, $event.checked)"></mat-slide-toggle>
        </div>
      </ng-container>

      <p style="font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.05em;margin:24px 0 8px">
        Thông báo sự kiện
      </p>
      <ng-container *ngFor="let pref of preferences">
        <div *ngIf="pref.type !== 'overload' && pref.type !== 'overdue'"
             style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee">
          <span>{{ pref.label }}</span>
          <mat-slide-toggle [checked]="pref.isEnabled" (change)="toggle(pref.type, $event.checked)"></mat-slide-toggle>
        </div>
      </ng-container>
    </div>
  </mat-card-content>
</mat-card>
