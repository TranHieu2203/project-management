<div *ngIf="result?.hasOverload" class="overload-banner">
  <mat-icon style="color:#e65100;font-size:20px;vertical-align:middle">warning</mat-icon>
  <span class="banner-text">
    Overload:
    <strong *ngIf="overloadedDays > 0">{{ overloadedDays }} ngày OL-01</strong>
    <span *ngIf="overloadedDays > 0 && overloadedWeeks > 0"> • </span>
    <strong *ngIf="overloadedWeeks > 0">{{ overloadedWeeks }} tuần OL-02</strong>
  </span>
  <span class="detail-hint"
    [matTooltip]="tooltipText"
    matTooltipClass="overload-tooltip"
    style="cursor:help;text-decoration:underline dotted;color:#0077cc;font-size:13px">
    Chi tiết
  </span>
  <span class="last-updated" *ngIf="lastUpdated">
    Cập nhật lúc: {{ lastUpdated | date:'HH:mm:ss' }}
  </span>
  <mat-spinner *ngIf="loading" diameter="14" style="display:inline-block"></mat-spinner>
</div>

<style>
  .overload-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff3e0;
    border: 1px solid #ffcc80;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 14px;
    flex-wrap: wrap;
  }
  .banner-text { color: #e65100; }
  .last-updated { margin-left: auto; font-size: 12px; color: #999; }
</style>
