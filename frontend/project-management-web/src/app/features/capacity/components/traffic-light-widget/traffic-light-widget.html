<div *ngIf="utilization" class="tl-widget">
  <div class="tl-header">
    <span class="tl-label">Dự báo</span>
    <span class="tl-status" [style.color]="statusColor">{{ statusLabel }}</span>
    <span class="tl-pct" [style.color]="statusColor">
      {{ utilization.utilizationPct | number:'1.1-1' }}%
    </span>
  </div>

  <div class="tl-detail" *ngIf="utilization.topContributions.length > 0">
    <span class="tl-detail-label">Top ngày:</span>
    <span *ngFor="let c of utilization.topContributions" class="tl-day">
      {{ c.date }}: {{ c.hours | number:'1.1-1' }}h
    </span>
  </div>

  <div class="tl-meta">
    <span class="tl-hours">
      {{ utilization.actualHours | number:'1.1-1' }}h / {{ utilization.availableHours | number:'1.0-0' }}h có sẵn
    </span>
    <button *ngIf="canOverride" mat-stroked-button (click)="override.emit()" class="tl-override-btn">
      Bỏ qua cảnh báo
    </button>
  </div>
</div>

<style>
  .tl-widget { border: 1px solid #ddd; border-radius: 4px; padding: 12px; }
  .tl-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .tl-label { font-weight: 600; font-size: 14px; }
  .tl-status { font-weight: 500; font-size: 14px; }
  .tl-pct { font-weight: 700; font-size: 20px; margin-left: auto; }
  .tl-detail { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .tl-detail-label { font-size: 12px; color: #666; }
  .tl-day { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  .tl-meta { display: flex; align-items: center; justify-content: space-between; }
  .tl-hours { font-size: 12px; color: #999; }
  .tl-override-btn { font-size: 12px; }
</style>
